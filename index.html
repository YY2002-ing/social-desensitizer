
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社交复盘模拟器 - Social Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #F5F5F5;
        }
        .wechat-bg { background-color: #EDEDED; }
        .wechat-bubble-user { background-color: #95EC69; }
        .wechat-bubble-opponent { background-color: #FFFFFF; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        /* 压迫特效（D24）：逼近语法——由小压大，朝用户砸过来，而非静态呈现 */
        @keyframes msgSlam {
            0% { opacity: 0; transform: scale(0.4) translateY(-6px); }
            60% { transform: scale(1.06); }
            100% { opacity: 1; transform: scale(1); }
        }
        .msg-slam { animation: msgSlam 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; transform-origin: top left; }
        @keyframes msgShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }
        .msg-shake { animation: msgSlam 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, msgShake 0.35s ease-in-out 0.28s; transform-origin: top left; }

        /* 倒计时末段：屏幕边缘泛红脉冲（刺激性效果，默认关闭，D27-7） */
        @keyframes edgePulse {
            0%, 100% { box-shadow: inset 0 0 24px 4px rgba(239, 68, 68, 0.18); }
            50% { box-shadow: inset 0 0 56px 14px rgba(239, 68, 68, 0.42); }
        }
        .edge-pulse { animation: edgePulse 0.9s ease-in-out infinite; }

        /* 3-2-1 入场倒数：数字砰地弹出再回稳 */
        @keyframes countPop {
            0% { opacity: 0; transform: scale(2.6); }
            55% { opacity: 1; transform: scale(0.92); }
            75% { transform: scale(1.06); }
            100% { opacity: 1; transform: scale(1); }
        }
        .count-pop { animation: countPop 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
